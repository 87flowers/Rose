name: Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup msys2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: make mingw-w64-ucrt-x86_64-clang mingw-w64-ucrt-x86_64-git mingw-w64-ucrt-x86_64-lld mingw-w64-ucrt-x86_64-llvm

    - name: Build AVX512
      shell: msys2 {0}
      run: make ARCH=icelake-client ARCH_TUNE=znver4 EXE=rose-windows-avx512.exe

    - name: Upload AVX512
      uses: actions/upload-artifact@v4
      with:
        path: rose-windows-avx512.exe
        archive: false

    - name: Build AVX2
      shell: msys2 {0}
      run: make ARCH=x86-64-v3 EXE=rose-windows-avx2.exe

    - name: Upload AVX512
      uses: actions/upload-artifact@v4
      with:
        path: rose-windows-avx2.exe
        archive: false
